<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zen Gomoku</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1 id="app-title">Zen Gomoku</h1>
      <div class="header-actions">
        <button id="btn-audio" class="btn btn-sm">🔊</button>
        <button id="btn-lang"  class="btn btn-sm">EN</button>
        <button id="btn-theme" class="btn btn-sm">🌙</button>
      </div>
    </header>

    <main class="app-main">
      <!-- Left: controls + status -->
      <aside class="controls">
        <div class="control-group">
          <label id="label-difficulty" for="sel-difficulty">Difficulté</label>
          <select id="sel-difficulty" class="select">
            <option value="easy">Débutant</option>
            <option value="medium">Intermédiaire</option>
            <option value="hard" selected>Expert</option>
          </select>
        </div>

        <div class="control-group">
          <label id="label-color" for="sel-color">Jouer avec</label>
          <select id="sel-color" class="select">
            <option value="black">Noir (1er)</option>
            <option value="white">Blanc (2e)</option>
          </select>
        </div>

        <div class="button-row">
          <button id="btn-new"  class="btn btn-primary">Nouvelle Partie</button>
          <button id="btn-undo" class="btn">Annuler</button>
        </div>

        <div id="status" class="status-text">À vous de jouer</div>
        <div id="thinking" class="thinking" hidden>L'IA réfléchit…</div>

        <section class="history-panel">
          <h2 id="history-title" class="history-title">Historique</h2>
          <ol id="history-list" class="history-list"></ol>
        </section>
      </aside>

      <!-- Right: board -->
      <section class="board-section">
        <canvas id="board-canvas" class="board-canvas"></canvas>
      </section>
    </main>
  </div> <!-- .app-container -->

  <script type="module" src="src/main.js"></script>
</body>
</html>
